<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读心术小游戏</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5efe7;
  display: flex;
  justify-content: center;
}

#app {
  width: 600px;
  margin-top: 40px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin: 6px;
}

.primary { background: #c88c7a; color: white; }
.secondary { background: #eee; }
</style>
</head>

<body>
<div id="app"></div>

<script>

let data = null;
let currentNode = null;

// 去掉 <> {}
function clean(text){
  return text.replace(/[{}<>]/g,"");
}

// 初始化
async function init(){
  try{
    const res = await fetch('./data/tree.json');
    const raw = await res.json();

    data = { roots: raw };

    renderStart();
  }catch(e){
    document.getElementById("app").innerHTML =
      "<div class='card'>❌ 无法读取 tree.json，请用本地服务器打开</div>";
  }
}

// 开始页
function renderStart(){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>读心术小游戏</h2>
      <p>在心里想一个词，我来猜～</p>
    </div>

    <div class="card">
      ${data.roots.map(r=>`
        <button onclick="start('${r.node_id}')">
          ${clean(r.label)}
        </button>
      `).join("")}
    </div>
  `;
}

// 选根节点
function start(id){
  currentNode = findNode(id,data.roots);
  next();
}

// 主逻辑
function next(){

  // 叶子词
  if(currentNode.node_type === "word_leaf"){
    guess(currentNode);
    return;
  }

  if(!currentNode.children || currentNode.children.length===0){
    document.getElementById("app").innerHTML =
      "<div class='card'>❌ 没有子节点了</div>";
    return;
  }

  // 非 fallback
  const normal = currentNode.children.filter(c=>!c.is_fallback);

  if(normal.length > 0){
    const pick = normal[Math.floor(Math.random()*normal.length)];
    ask(pick);
  }else{
    // fallback
    const fb = currentNode.children.find(c=>c.is_fallback);
    currentNode = fb;
    next();
  }
}

// 提问
function ask(node){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>TA是不是 ${clean(node.label)}？</h3>
    </div>

    <button class="primary" onclick="answer(true,'${node.node_id}')">是</button>
    <button class="secondary" onclick="answer(false,'${node.node_id}')">否</button>
  `;
}

// 回答
function answer(yes,id){

  const node = findNode(id,data.roots);

  if(yes){
    currentNode = node;
  }else{
    // 标记已问过（避免重复问）
    currentNode.children =
      currentNode.children.filter(c=>c.node_id !== id);
  }

  next();
}

// 查找节点
function findNode(id,nodes){
  for(let n of nodes){
    if(n.node_id === id) return n;

    if(n.children){
      const r = findNode(id,n.children);
      if(r) return r;
    }
  }
}

// 猜词
function guess(node){
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>我猜你想的是：</h2>
      <h1>${node.word_text}</h1>
    </div>

    <button class="primary" onclick="renderStart()">猜对了</button>
    <button class="secondary" onclick="renderStart()">猜错了</button>
  `;
}

init();

</script>
</body>
</html>
