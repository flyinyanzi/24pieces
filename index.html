<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>读心术小游戏</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --card: rgba(255,255,255,0.82);
      --text: #4d4036;
      --muted: #8b7d73;
      --accent: #c88c7a;
      --accent-soft: #ead0c8;
      --line: rgba(77,64,54,0.12);
      --shadow: 0 14px 40px rgba(80, 57, 44, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f9f5ef 0%, #f5efe7 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      gap: 18px;
    }

    .scene-shell {
      position: relative;
      min-height: 76vh;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.35), transparent 30%),
        linear-gradient(160deg, var(--scene-a, #f8efe6), var(--scene-b, #efe2d4));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,0.2), transparent 16%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,0.22), transparent 18%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.64);
      border: 1px solid rgba(255,255,255,0.62);
      color: var(--muted);
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    .progress-strip {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 58%;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(77,64,54,0.12);
      transition: transform .2s ease, background .2s ease;
    }

    .dot.filled {
      background: var(--accent);
      transform: scale(1.15);
    }

    .main {
      position: relative;
      z-index: 1;
      padding: 18px 20px 24px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 10px 30px rgba(107, 86, 74, 0.06);
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.18;
      letter-spacing: 0.01em;
    }

    .subtitle, .body-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 16px;
    }

    .scene-poem {
      margin: 0;
      white-space: pre-wrap;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.85;
    }

    .question {
      font-size: clamp(22px, 3.5vw, 30px);
      line-height: 1.45;
      margin: 0;
    }

    .button-row, .choice-grid, .root-grid {
      display: grid;
      gap: 12px;
    }

    .button-row {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .root-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .choice-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    button {
      appearance: none;
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.35;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      background: white;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(104, 82, 67, 0.08);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(104, 82, 67, 0.1);
    }

    button:disabled {
      opacity: 0.52;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .primary {
      background: linear-gradient(180deg, #d89e8d, #ca8c79);
      color: #fffaf8;
    }

    .secondary {
      background: rgba(255,255,255,0.84);
      color: var(--text);
    }

    .ghost {
      background: rgba(255,255,255,0.52);
      color: var(--muted);
      border: 1px solid rgba(77,64,54,0.08);
    }

    .root-btn {
      min-height: 88px;
      text-align: left;
      display: flex;
      align-items: flex-end;
      font-size: 16px;
      border: 1px solid rgba(77,64,54,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.74));
    }

    .tiny {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .result-word {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.2;
      margin: 8px 0 0;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(77,64,54,0.07);
      color: var(--muted);
      font-size: 13px;
    }

    .solved-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .solved-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.64);
      color: var(--text);
      font-size: 14px;
      border: 1px solid rgba(77,64,54,0.06);
    }

    .hidden-box {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.74));
      border: 1px solid rgba(255,255,255,0.62);
      text-align: center;
    }

    .hidden-word {
      font-size: clamp(30px, 6vw, 52px);
      margin: 10px 0;
      letter-spacing: .08em;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding-bottom: 6px;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .scene-shell { min-height: 84vh; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .progress-strip { max-width: 100%; justify-content: flex-start; }
      .card { padding: 18px; }
    }
  </style>
</head>

    const appState = {
      view: "welcome",
      data: null,
      solvedWordIds: new Set(),
      round: null,
      aiRound: null,
      previousAnswer: null,

      revealedIntroScene: false,
      randomSeed: Date.now()
    };

    function randomPick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function format(template, vars) {
      return template.replace(/\{(\w+)\}/g, (_, key) => vars[key] ?? "");
    }

    function currentScene() {
      const solved = appState.solvedWordIds.size;
      return SCENES.find(scene => solved >= scene.minSolved && solved <= scene.maxSolved) || SCENES[0];
    }

    function updateSceneUI() {
      const scene = currentScene();
      const shell = document.getElementById("sceneShell");
      shell.style.setProperty("--scene-a", scene.a);
      shell.style.setProperty("--scene-b", scene.b);
      document.getElementById("sceneBadge").textContent = `${scene.title} · ${appState.solvedWordIds.size} / ${TARGET_SUCCESS_COUNT}`;

      const strip = document.getElementById("progressStrip");
      strip.innerHTML = "";
      for (let i = 0; i < TARGET_SUCCESS_COUNT; i += 1) {
        const dot = document.createElement("div");
        dot.className = `dot ${i < appState.solvedWordIds.size ? "filled" : ""}`;
        strip.appendChild(dot);
      }
    }

    function flattenRoots(roots) {
      return roots.map(r => ({ id: r.id, label: r.label }));
    }

    function getRootById(id) {
      return appState.data.roots.find(root => root.id === id) || null;
    }

    function isWordLeaf(node) {
      return node && node.type === "word_leaf";
    }

    function getQuestionText(node) {
      return `TA是不是“${node.label}”`;
    }

    function startRoundWithRoot(rootId) {
      const root = getRootById(rootId);
      if (!root) return;
      appState.round = {
        rootId,
        currentNode: root,
        stack: [],
        siblingState: new Map(),
        lastGuessedWordId: null,
        exhausted: false
      };
      appState.previousAnswer = null;
      appState.view = "question";
      render();
    }

    function ensureSiblingState(parentNode) {
      if (!appState.round.siblingState.has(parentNode.id)) {
        const children = parentNode.children || [];
        appState.round.siblingState.set(parentNode.id, {
          askedIds: [],
          noIds: [],
          yesId: null,
          fallbackEntered: false,
          childOrder: children.map(c => c.id)
        });
      }
      return appState.round.siblingState.get(parentNode.id);
    }

    function availableNormalChildren(parentNode) {
      const state = ensureSiblingState(parentNode);
      return (parentNode.children || []).filter(child => !child.isFallback && !state.askedIds.includes(child.id));
    }

    function fallbackChild(parentNode) {
      return (parentNode.children || []).find(child => child.isFallback) || null;
    }

    function getNextQuestionNode(parentNode) {
      const normal = availableNormalChildren(parentNode);
      if (normal.length > 0) return randomPick(normal);

      const fallback = fallbackChild(parentNode);
      const state = ensureSiblingState(parentNode);
      if (fallback && !state.fallbackEntered) {
        state.fallbackEntered = true;
        return getNextQuestionNode(fallback) || fallback;
      }

      return null;
    }

    function beginQuestionAt(parentNode, fromAnswer = null) {
      appState.previousAnswer = fromAnswer;
      if (isWordLeaf(parentNode)) {
        appState.round.lastGuessedWordId = parentNode.wordId;
        appState.view = "guess_word";
        render();
        return;
      }

      const next = getNextQuestionNode(parentNode);
      if (!next) {
        appState.view = "no_more_words";
        render();
        return;
      }

      if (next.isFallback) {
        beginQuestionAt(next, fromAnswer);
        return;
      }

      appState.round.currentNode = next;
      appState.view = "question";
      render();
    }

    function answerCurrentQuestion(answer) {
      const node = appState.round.currentNode;
      if (!node) return;

      // 特殊敏感分支拦截
      if (answer === true && node.label === "更倾向于消极") {
        appState.view = "negative_confirm";
        render();
        return;
      }

      const parent = findParentOfNode(appState.round.rootId, node.id);
      if (!parent) return;
      const siblingState = ensureSiblingState(parent);
      if (!siblingState.askedIds.includes(node.id)) siblingState.askedIds.push(node.id);

      appState.round.stack.push({
        nodeId: node.id,
        parentId: parent.id,
        answer
      });

      if (answer) {
        siblingState.yesId = node.id;
        appState.previousAnswer = true;

        const children = node.children || [];
        if (children.length === 0 && isWordLeaf(node)) {
          appState.round.lastGuessedWordId = node.wordId;
          appState.view = "guess_word";
          render();
          return;
        }

        if (children.length === 0) {
          appState.view = "no_more_words";
          render();
          return;
        }

        beginQuestionAt(node, true);
      } else {
        siblingState.noIds.push(node.id);
        appState.previousAnswer = false;
        beginQuestionAt(parent, false);
      }
    }

    function findParentOfNode(rootId, nodeId) {
      const root = getRootById(rootId);
      if (!root) return null;
      let found = null;
      walk(root, (node) => {
        if (!node.children) return;
        for (const child of node.children) {
          if (child.id === nodeId) {
            found = node;
            return true;
          }
        }
        return false;
      });
      return found;
    }

    function walk(node, fn) {
      const stop = fn(node);
      if (stop) return true;
      if (!node.children) return false;
      for (const child of node.children) {
        const childStop = walk(child, fn);
        if (childStop) return true;
      }
      return false;
    }

    function findNodeById(rootNode, id) {
      let result = null;
      walk(rootNode, (node) => {
        if (node.id === id) {
          result = node;
          return true;
        }
        return false;
      });
      return result;
    }

    function goBackOneStep() {
      if (!appState.round || appState.round.stack.length === 0) return;
      // 简化版：回到根并重放历史（去掉最后一步）
      const history = appState.round.stack.slice(0, -1);
      const rootId = appState.round.rootId;
      startRoundWithRoot(rootId);
      appState.round.stack = [];
      appState.round.siblingState = new Map();
      appState.previousAnswer = null;

      const replay = [...history];
      for (const item of replay) {
        const node = findNodeById(getRootById(rootId), item.nodeId);
        if (!node) continue;
        appState.round.currentNode = node;
        const parent = findParentOfNode(rootId, node.id);
        if (!parent) continue;
        const siblingState = ensureSiblingState(parent);
        if (!siblingState.askedIds.includes(node.id)) siblingState.askedIds.push(node.id);
        if (item.answer) {
          siblingState.yesId = node.id;
          appState.round.stack.push(item);
          if (!isWordLeaf(node)) {
            const children = node.children || [];
            if (children.length > 0) {
              const next = getNextQuestionNode(node);
              if (next && !next.isFallback) appState.round.currentNode = next;
            }
          }
        } else {
          siblingState.noIds.push(node.id);
          appState.round.stack.push(item);
          beginQuestionAt(parent, false);
        }
      }

      if (history.length === 0) {
        beginQuestionAt(getRootById(rootId), null);
      } else {
        render();
      }
    }

    function confirmGuess(correct) {
      const wordId = appState.round.lastGuessedWordId;
      const wordName = getWordNameById(wordId);
      if (correct) {
        if (wordId) appState.solvedWordIds.add(wordId);
        appState.view = "guess_success";
      } else {
        appState.view = "guess_fail";
      }
      appState.round.guessedWordName = wordName;
      render();
    }

    function getWordNameById(wordId) {
      let found = null;
      for (const root of appState.data.roots) {
        walk(root, (node) => {
          if (node.wordId === wordId) {
            found = node.label;
            return true;
          }
          return false;
        });
        if (found) break;
      }
      return found;
    }

    function enterNextRoundChoice() {
      if (appState.solvedWordIds.size >= TARGET_SUCCESS_COUNT) {
        appState.view = "hidden_word";
      } else {
        appState.view = "next_choice";
      }
      appState.round = null;
      render();
    }

    function startAiRound() {
      const allLeafNodes = [];
      for (const root of appState.data.roots) {
        walk(root, (node) => {
          if (isWordLeaf(node)) allLeafNodes.push({ root, leaf: node });
          return false;
        });
      }
      const picked = randomPick(allLeafNodes);
      const path = buildPathForLeaf(picked.root, picked.leaf.id);
      appState.aiRound = {
        rootId: picked.root.id,
        leafNodeId: picked.leaf.id,
        wordId: picked.leaf.wordId,
        wordLabel: picked.leaf.label,
        path,
        revealIndex: 0
      };
      appState.view = "ai_intro";
      render();
    }

    function buildPathForLeaf(root, leafId) {
      const path = [];
      function dfs(node, acc) {
        const nextAcc = [...acc, node];
        if (node.id === leafId) return nextAcc;
        if (!node.children) return null;
        for (const child of node.children) {
          const result = dfs(child, nextAcc);
          if (result) return result;
        }
        return null;
      }
      return dfs(root, []) || path;
    }

    function nextAiReveal() {
      if (!appState.aiRound) return;
      appState.aiRound.revealIndex += 1;
      const lastHintIndex = appState.aiRound.path.length - 2;
      if (appState.aiRound.revealIndex > lastHintIndex) {
        appState.aiRound.revealIndex = lastHintIndex;
      }
      appState.view = "ai_reveal";
      render();
    }

    function showAiAnswer(giveUp = false) {
      appState.view = giveUp ? "ai_giveup" : "ai_answer";
      render();
    }

    function getRootBatch() {
      const roots = flattenRoots(appState.data.roots);
      if (roots.length <= 4) return roots;
      const batch = [];
      let offset = appState.rootBatchOffset % roots.length;
      while (batch.length < 4) {
        batch.push(roots[offset % roots.length]);
        offset += 1;
      }
      return batch;
    }

    function cycleRootBatch() {
      appState.rootBatchOffset += 4;
      render();
    }

    function textForQuestion(node) {
      const q = getQuestionText(node);
      if (appState.round?.stack?.length === 0) return format(REPLY_TEXT.rootQuestion, { q: node.label });
      if (appState.previousAnswer === true) return format(randomPick(REPLY_TEXT.yesLeads), { q });
      if (appState.previousAnswer === false) return format(randomPick(REPLY_TEXT.noLeads), { q });
      return `${q}？`;
    }

    function renderNextChoiceBlock() {
      return `
        <div class="card">
          <h2 class="question">${REPLY_TEXT.nextRound}</h2>
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
          <button class="secondary" onclick="startAiRound()">你来想一个词</button>
        </div>
      `;
    }

    function renderHiddenWord() {
      return `
        <div class="card">
          <p class="tiny">终章 · 24 / 24</p>
          <h2 class="title">你已经把所有光点都点亮啦</h2>
          <p class="scene-poem">${currentScene().text}</p>
        </div>
        <div class="hidden-box">
          <p class="tiny">隐藏词已解锁</p>
          <div class="hidden-word">${HIDDEN_WORD}</div>
          <p class="scene-poem">谢谢你一路把这些词慢慢走完。它们像被拾起的落叶、歌、星光和街道，一点一点地拼成了最后这句想送给你的话。</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker(true)">再玩一轮</button>
        </div>
      `;
    }

    function renderAiIntro() {
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">${REPLY_TEXT.aiIntro}</h2>
          <p class="scene-poem">${REPLY_TEXT.aiReady}</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="nextAiReveal()">开始</button>
          <button class="ghost" onclick="goToRootPicker()">返回</button>
        </div>
      `;
    }

    function renderAiReveal() {
      const path = appState.aiRound.path;
      const hints = path.slice(0, Math.max(1, appState.aiRound.revealIndex + 1)).filter(n => !isWordLeaf(n));
      const lastHintIndex = path.length - 2;
      const canGiveUp = appState.aiRound.revealIndex >= lastHintIndex;
      return `
        <div class="card">
          <p class="tiny">我正在一点点给你提示</p>
          <div class="solved-list">
            ${hints.map(h => `<span class="solved-item">${h.label}</span>`).join("")}
          </div>
        </div>
        <div class="button-row">
          <button class="primary" onclick="showAiAnswer(false)">我猜到了</button>
          <button class="secondary" onclick="nextAiReveal()" ${canGiveUp ? "disabled" : ""}>继续</button>
          <button class="ghost" onclick="showAiAnswer(true)" ${canGiveUp ? "" : "disabled"}>我猜不到</button>
        </div>
      `;
    }

    function renderAiAnswer(giveUp = false) {
      const word = appState.aiRound.wordLabel;
      const line = format(randomPick(giveUp ? REPLY_TEXT.aiGiveUp : REPLY_TEXT.aiAnswer), { word });
      const special = SPECIAL_LINES[word];
      return `
        <div class="card">
          <h2 class="question">${line}</h2>
          <p class="result-word">${word}</p>
          ${special ? `<p class="scene-poem" style="margin-top:14px;">${special}</p>` : ""}
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
          <button class="secondary" onclick="startAiRound()">你再想一个词</button>
        </div>
      `;
    }

    function goToRootPicker(resetRound = false) {
      if (resetRound) {
        appState.round = null;
        appState.aiRound = null;
      }
      appState.view = "root_picker";
      render();
    }

    function startRootById(rootId) {
      startRoundWithRoot(rootId);
      beginQuestionAt(getRootById(rootId), null);
    }

    function renderWelcomeView() {
      appState.view = "welcome";
      render();
    }

    function render() {
      updateSceneUI();
      const main = document.getElementById("appMain");
      let html = "";
      switch (appState.view) {
        case "welcome":
          html = renderWelcome();
          break;
        case "root_picker":
          html = renderRootPicker();
          break;
        case "question":
          html = renderQuestion();
          break;
        case "negative_confirm":
          html = renderNegativeConfirm();
          break;
        case "negative_note_continue":
          html = renderSimpleMessage(`
            <div class="button-row">
              <button class="primary" onclick="resumeAfterNegativeContinue()">继续</button>
            </div>
          `);
          break;
        case "negative_note_stop":
          html = renderSimpleMessage(renderNextChoiceBlock());
          break;
        case "guess_word":
          html = renderGuessWord();
          break;
        case "guess_success":
          html = renderGuessSuccess();
          break;
        case "guess_fail":
          html = renderGuessFail();
          break;
        case "no_more_words":
          html = renderNoMoreWords();
          break;
        case "next_choice":
          html = renderNextChoiceBlock();
          break;
        case "hidden_word":
          html = renderHiddenWord();
          break;
        case "ai_intro":
          html = renderAiIntro();
          break;
        case "ai_reveal":
          html = renderAiReveal();
          break;
        case "ai_answer":
          html = renderAiAnswer(false);
          break;
        case "ai_giveup":
          html = renderAiAnswer(true);
          break;
        default:
          html = renderWelcome();
      }
      main.innerHTML = html;
    }

    function resumeAfterNegativeContinue() {
      if (!appState.round || !appState.round.currentNode) return;
      answerCurrentQuestion(true);
    }

    async function bootstrap() {
      // 如果后面要接真实 JSON，可以把下面这段改成 fetch:
      // const res = await fetch('./data/reading_game_tree_v1.json');
      // appState.data = await res.json();
      appState.data = DEMO_DATA;
      render();
    }

    bootstrap();
  </script>
</body>
</html>
