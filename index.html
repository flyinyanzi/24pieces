<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>读心术小游戏</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --card: rgba(255,255,255,0.84);
      --text: #4d4036;
      --muted: #8b7d73;
      --accent: #c88c7a;
      --line: rgba(77,64,54,0.12);
      --shadow: 0 14px 40px rgba(80,57,44,0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f9f5ef 0%, #f5efe7 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      gap: 18px;
    }

    .scene-shell {
      position: relative;
      min-height: 76vh;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.35), transparent 30%),
        linear-gradient(160deg, var(--scene-a, #f8efe6), var(--scene-b, #efe2d4));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,0.2), transparent 16%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,0.22), transparent 18%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.64);
      border: 1px solid rgba(255,255,255,0.62);
      color: var(--muted);
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    .progress-strip {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 58%;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(77,64,54,0.12);
      transition: transform .2s ease, background .2s ease;
    }

    .dot.filled {
      background: var(--accent);
      transform: scale(1.15);
    }

    .main {
      position: relative;
      z-index: 1;
      padding: 18px 20px 24px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 10px 30px rgba(107,86,74,0.06);
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.18;
      letter-spacing: 0.01em;
    }

    .body-text, .scene-poem {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .question {
      font-size: clamp(22px, 3.5vw, 30px);
      line-height: 1.45;
      margin: 0;
    }

    .button-row, .root-grid {
      display: grid;
      gap: 12px;
    }

    .button-row {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .root-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    button {
      appearance: none;
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.35;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      background: white;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(104,82,67,0.08);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(104,82,67,0.1);
    }

    button:disabled {
      opacity: 0.52;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .primary {
      background: linear-gradient(180deg, #d89e8d, #ca8c79);
      color: #fffaf8;
    }

    .secondary {
      background: rgba(255,255,255,0.84);
      color: var(--text);
    }

    .ghost {
      background: rgba(255,255,255,0.52);
      color: var(--muted);
      border: 1px solid rgba(77,64,54,0.08);
    }

    .root-btn {
      min-height: 88px;
      text-align: left;
      display: flex;
      align-items: flex-end;
      font-size: 16px;
      border: 1px solid rgba(77,64,54,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.74));
    }

    .tiny {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .result-word {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.2;
      margin: 8px 0 0;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(77,64,54,0.07);
      color: var(--muted);
      font-size: 13px;
    }

    .solved-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .solved-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.64);
      color: var(--text);
      font-size: 14px;
      border: 1px solid rgba(77,64,54,0.06);
    }

    .hidden-box {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.74));
      border: 1px solid rgba(255,255,255,0.62);
      text-align: center;
    }

    .hidden-word {
      font-size: clamp(30px, 6vw, 52px);
      margin: 10px 0;
      letter-spacing: .08em;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding-bottom: 6px;
    }

    .error-card {
      color: #8c2f2f;
      background: #fff3f3;
      border: 1px solid #f0caca;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .scene-shell { min-height: 84vh; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .progress-strip { max-width: 100%; justify-content: flex-start; }
      .card { padding: 18px; }
    }
  </style>
</head>

    const appState = {
      view: "loading",
      data: { roots: [] },
      solvedWordIds: new Set(),

    function cleanLabel(label = "") {
      return label.replace(/[{}<>]/g, "").replace(/（.*?）/g, "").trim();
    }

    function rand(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function format(template, vars) {
      return template.replace(/\{(\w+)\}/g, (_, key) => vars[key] ?? "");
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function currentScene() {
      const n = appState.solvedWordIds.size;
      return SCENES.find(s => n >= s.min && n <= s.max) || SCENES[0];
    }

    function updateSceneUI() {
      const scene = currentScene();
      const shell = document.getElementById("sceneShell");
      shell.style.setProperty("--scene-a", scene.a);
      shell.style.setProperty("--scene-b", scene.b);
      document.getElementById("sceneBadge").textContent = `${scene.title} · ${appState.solvedWordIds.size} / ${TARGET_SUCCESS_COUNT}`;

      const strip = document.getElementById("progressStrip");
      strip.innerHTML = "";
      for (let i = 0; i < TARGET_SUCCESS_COUNT; i++) {
        const dot = document.createElement("div");
        dot.className = `dot ${i < appState.solvedWordIds.size ? "filled" : ""}`;
        strip.appendChild(dot);
      }
    }

    function getVisibleRoots() {
      return appState.data.roots.filter(root => {
        const label = cleanLabel(root.label);
        return !label.includes("隐藏词组");
      });
    }

    function getRootBatch() {
      const roots = getVisibleRoots();
      if (roots.length <= 4) return roots;
      const batch = [];
      let offset = appState.rootBatchOffset % roots.length;
      while (batch.length < 4) {
        batch.push(roots[offset % roots.length]);
        offset += 1;
      }
      return batch;
    }

    function cycleRootBatch() {
      appState.rootBatchOffset += 4;
      render();
    }

    function findNodeById(id, nodes = appState.data.roots) {
      for (const node of nodes) {
        if (node.node_id === id) return node;
        if (node.children) {
          const found = findNodeById(id, node.children);
          if (found) return found;
        }
      }
      return null;
    }

    function isWordLeaf(node) {
      return node && node.node_type === "word_leaf";
    }

    function getWordNameById(wordId) {
      let found = null;
      for (const root of appState.data.roots) {
        walk(root, (node) => {
          if (node.word_id === wordId) {
            found = node.word_text || cleanLabel(node.label);
            return true;
          }
          return false;
        });
        if (found) break;
      }
      return found;
    }

    function walk(node, fn) {
      const stop = fn(node);
      if (stop) return true;
      if (!node.children) return false;
      for (const child of node.children) {
        if (walk(child, fn)) return true;
      }
      return false;
    }

    function getChildren(nodeId) {
      const node = findNodeById(nodeId);
      return node?.children || [];
    }

    function createRound(rootId) {
      const root = findNodeById(rootId);
      return {
        rootId,
        currentParentId: rootId,
        currentQuestionNodeId: null,
        pathSnapshots: [],
        statesByParent: {}
      };
    }

    function getParentState(parentId) {
      if (!appState.round.statesByParent[parentId]) {
        appState.round.statesByParent[parentId] = {
          askedIds: [],
          fallbackEntered: false
        };
      }
      return appState.round.statesByParent[parentId];
    }

    function getAvailableNormalChildren(parentId) {
      const children = getChildren(parentId);
      const st = getParentState(parentId);
      return children.filter(c => !c.is_fallback && !st.askedIds.includes(c.node_id));
    }

    function getFallbackChild(parentId) {
      const children = getChildren(parentId);
      return children.find(c => c.is_fallback) || null;
    }

    function takeSnapshot() {
      appState.round.pathSnapshots.push(deepClone({
        currentParentId: appState.round.currentParentId,
        currentQuestionNodeId: appState.round.currentQuestionNodeId,
        statesByParent: appState.round.statesByParent
      }));
    }

    function restoreLastSnapshot() {
      const history = appState.round.pathSnapshots;
      if (!history.length) return false;
      const last = history.pop();
      appState.round.currentParentId = last.currentParentId;
      appState.round.currentQuestionNodeId = last.currentQuestionNodeId;
      appState.round.statesByParent = last.statesByParent;
      return true;
    }

    function beginAtParent(parentId, previousAnswer = null) {
      appState.round.previousAnswer = previousAnswer;
      appState.round.currentParentId = parentId;

      const normalChildren = getAvailableNormalChildren(parentId);
      if (normalChildren.length > 0) {
        const picked = rand(normalChildren);
        appState.round.currentQuestionNodeId = picked.node_id;
        appState.view = "question";
        render();
        return;
      }

      const parentState = getParentState(parentId);
      const fallback = getFallbackChild(parentId);
      if (fallback && !parentState.fallbackEntered) {
        parentState.fallbackEntered = true;
        beginAtParent(fallback.node_id, previousAnswer);
        return;
      }

      appState.view = "no_more_words";
      render();
    }

    function startRootById(rootId) {
      appState.round = createRound(rootId);
      beginAtParent(rootId, null);
    }

    function textForQuestion(node) {
      const q = cleanLabel(node.label);
      const prev = appState.round?.previousAnswer;
      if (prev === true) return format(rand(REPLY_TEXT.yesLeads), { q });
      if (prev === false) return format(rand(REPLY_TEXT.noLeads), { q });
      return `TA是不是“${q}”？`;
    }

    function answerCurrentQuestion(answer) {
      const qNode = findNodeById(appState.round.currentQuestionNodeId);
      const parentId = appState.round.currentParentId;
      const parentState = getParentState(parentId);

      takeSnapshot();

      if (!parentState.askedIds.includes(qNode.node_id)) {
        parentState.askedIds.push(qNode.node_id);
      }

      if (answer === true && cleanLabel(qNode.label) === "更倾向于消极") {
        appState.view = "negative_confirm";
        render();
        return;
      }

      if (answer) {
        if (isWordLeaf(qNode)) {
          appState.round.guessedWordId = qNode.word_id;
          appState.round.guessedWordName = qNode.word_text || cleanLabel(qNode.label);
          appState.view = "guess_word";
          render();
          return;
        }

        const children = qNode.children || [];
        if (!children.length) {
          appState.view = "no_more_words";
          render();
          return;
        }

        beginAtParent(qNode.node_id, true);
      } else {
        beginAtParent(parentId, false);
      }
    }

    function goBackOneStep() {
      if (!appState.round) return;
      const ok = restoreLastSnapshot();
      if (!ok) return;
      appState.view = "question";
      render();
    }

    function confirmNegativeContinue(shouldContinue) {
      if (shouldContinue) {
        appState.tempMessage = REPLY_TEXT.negativeContinue;
        appState.view = "negative_note_continue";
      } else {
        appState.tempMessage = REPLY_TEXT.negativeStop;
        appState.view = "negative_note_stop";
      }
      render();
    }

    function resumeAfterNegativeContinue() {
      const qNode = findNodeById(appState.round.currentQuestionNodeId);
      if (!qNode) return;
      const children = qNode.children || [];
      if (!children.length) {
        appState.view = "no_more_words";
        render();
        return;
      }
      beginAtParent(qNode.node_id, true);
    }

    function confirmGuess(correct) {
      const wordId = appState.round.guessedWordId;
      const wordName = appState.round.guessedWordName;
      if (correct) {
        if (wordId) appState.solvedWordIds.add(wordId);
        appState.round.resultWordName = wordName;
        appState.view = "guess_success";
      } else {
        appState.view = "guess_fail";
      }
      render();
    }

    function enterNextRoundChoice() {
      if (appState.solvedWordIds.size >= TARGET_SUCCESS_COUNT) {
        appState.view = "hidden_word";
      } else {
        appState.view = "next_choice";
      }
      appState.round = null;
      render();
    }

    function getAiEligibleLeaves() {
      const leaves = [];
      for (const root of getVisibleRoots()) {
        walk(root, (node) => {
          if (isWordLeaf(node)) {
            const label = node.label || "";
            if (!label.includes("不要出现在猜AI环节")) {
              leaves.push({ root, leaf: node });
            }
          }
          return false;
        });
      }
      return leaves;
    }

    function buildPathToLeaf(rootNode, leafId) {
      function dfs(node, path) {
        const nextPath = [...path, node];
        if (node.node_id === leafId) return nextPath;
        if (!node.children) return null;
        for (const child of node.children) {
          const result = dfs(child, nextPath);
          if (result) return result;
        }
        return null;
      }
      return dfs(rootNode, []) || [];
    }

    function startAiRound() {
      const allLeaves = getAiEligibleLeaves();
      const picked = rand(allLeaves);
      const path = buildPathToLeaf(picked.root, picked.leaf.node_id).filter(n => !isWordLeaf(n));

      appState.aiRound = {
        wordId: picked.leaf.word_id,
        wordLabel: picked.leaf.word_text || cleanLabel(picked.leaf.label),
        path,
        revealIndex: 0
      };

      appState.view = "ai_intro";
      render();
    }

    function nextAiReveal() {
      const ai = appState.aiRound;
      if (!ai) return;
      if (ai.revealIndex < ai.path.length) ai.revealIndex += 1;
      appState.view = "ai_reveal";
      render();
    }

    function showAiAnswer(giveUp = false) {
      appState.view = giveUp ? "ai_giveup" : "ai_answer";
      render();
    }

    function confirmAiGuessResult(correct) {
      appState.view = correct ? "ai_answer_success" : "ai_answer_fail";
      render();
    }

    function renderWelcome() {
      const scene = currentScene();
      return `
        <div class="card">
          <p class="tiny">${scene.badge}</p>
          <h1 class="title">读心术小游戏</h1>
          <p class="scene-poem">${REPLY_TEXT.welcome}</p>
        </div>
        <div class="card">
          <p class="scene-poem">${scene.text}</p>
          <div class="button-row" style="margin-top:18px;">
            <button class="primary" onclick="goToRootPicker()">开始</button>
          </div>
        </div>
      `;
    }

    function goToRootPicker() {
      appState.view = "root_picker";
      appState.round = null;
      render();
    }

    function renderRootPicker() {
      const roots = getRootBatch();
      return `
        <div class="card">
          <p class="tiny">从一批祖父分类里开始会更顺一些</p>
          <h2 class="title" style="font-size:28px;">先从一个模块开始吧</h2>
          <p class="body-text">你可以直接点一个最接近的方向。如果一时间没有感觉，也可以换一批看看。</p>
        </div>
        <div class="root-grid">
          ${roots.map(root => `
            <button class="root-btn" onclick="startRootById('${root.node_id}')">${cleanLabel(root.label)}</button>
          `).join("")}
        </div>
        <div class="button-row">
          <button class="secondary" onclick="cycleRootBatch()">换一批</button>
          <button class="ghost" onclick="renderWelcomeView()">回到欢迎页</button>
        </div>
      `;
    }

    function renderWelcomeView() {
      appState.view = "welcome";
      render();
    }

    function renderQuestion() {
      const node = findNodeById(appState.round.currentQuestionNodeId);
      const scene = currentScene();
      return `
        <div class="card">
          <p class="tiny">${scene.badge}</p>
          <h2 class="question">${textForQuestion(node)}</h2>
        </div>
        <div class="button-row">
          <button class="primary" onclick="answerCurrentQuestion(true)">是</button>
          <button class="secondary" onclick="answerCurrentQuestion(false)">否</button>
          <button class="ghost" onclick="goBackOneStep()" ${appState.round.pathSnapshots.length === 0 ? "disabled" : ""}>返回上一问</button>
        </div>
        <div class="card">
          <p class="tiny">已猜中 ${appState.solvedWordIds.size} / ${TARGET_SUCCESS_COUNT}</p>
          <div class="solved-list">
            ${
              [...appState.solvedWordIds].slice(-8).map(id => `<span class="solved-item">${getWordNameById(id)}</span>`).join("")
              || `<span class="tiny">还没有解锁词语，慢慢来～</span>`
            }
          </div>
        </div>
      `;
    }

    function renderNegativeConfirm() {
      return `
        <div class="card">
          <h2 class="question">${REPLY_TEXT.negativePrompt}</h2>
        </div>
        <div class="button-row">
          <button class="primary" onclick="confirmNegativeContinue(true)">是</button>
          <button class="secondary" onclick="confirmNegativeContinue(false)">否</button>
        </div>
      `;
    }

    function renderSimpleMessage(nextActionHtml) {
      return `
        <div class="card">
          <p class="scene-poem">${appState.tempMessage || ""}</p>
        </div>
        ${nextActionHtml}
      `;
    }

    function renderGuessWord() {
      const wordName = appState.round.guessedWordName || "……";
      const line = format(rand(REPLY_TEXT.guessWord), { word: wordName });
      return `
        <div class="card">
          <p class="tiny">我脑海里浮现了一个词</p>
          <h2 class="question">${line}</h2>
          <p class="result-word">${wordName}</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="confirmGuess(true)">猜对了</button>
          <button class="secondary" onclick="confirmGuess(false)">猜错了</button>
        </div>
      `;
    }

    function renderGuessSuccess() {
      const word = appState.round?.resultWordName || "";
      const special = SPECIAL_LINES[word];
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">${rand(REPLY_TEXT.guessed)}</h2>
          <p class="result-word">${word}</p>
          ${special ? `<p class="scene-poem" style="margin-top:14px;">${special}</p>` : ""}
        </div>
        <div class="card">
          <p class="tiny">当前进度</p>
          <div class="chips">
            <span class="chip">已猜中 ${appState.solvedWordIds.size} / ${TARGET_SUCCESS_COUNT}</span>
            <span class="chip">本轮解锁：${word}</span>
          </div>
        </div>
        <div class="button-row">
          <button class="primary" onclick="enterNextRoundChoice()">继续</button>
        </div>
      `;
    }

    function renderGuessFail() {
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">${rand(REPLY_TEXT.failed)}</h2>
        </div>
        ${renderNextChoiceBlock()}
      `;
    }

    function renderNoMoreWords() {
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">${rand(REPLY_TEXT.noMore)}</h2>
        </div>
        ${renderNextChoiceBlock()}
      `;
    }

    function renderNextChoiceBlock() {
      return `
        <div class="card">
          <h2 class="question">${REPLY_TEXT.nextRound}</h2>
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
          <button class="secondary" onclick="startAiRound()">你来想一个词</button>
        </div>
      `;
    }

    function renderHiddenWord() {
      return `
        <div class="card">
          <p class="tiny">终章 · 24 / 24</p>
          <h2 class="title">你已经把所有光点都点亮啦</h2>
          <p class="scene-poem">${currentScene().text}</p>
        </div>
        <div class="hidden-box">
          <p class="tiny">隐藏词已解锁</p>
          <div class="hidden-word">${HIDDEN_WORDS[0]}</div>
          <div class="hidden-word" style="font-size:24px; margin-top:0;">${HIDDEN_WORDS[1]}</div>
          <p class="scene-poem">谢谢你一路把这些词慢慢走完。它们像被拾起的落叶、歌、星光和街道，一点一点地拼成了最后这句想送给你的话。</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">再玩一轮</button>
        </div>
      `;
    }

    function renderAiIntro() {
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">${REPLY_TEXT.aiIntro}</h2>
          <p class="scene-poem">${REPLY_TEXT.aiReady}</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="nextAiReveal()">开始</button>
          <button class="ghost" onclick="goToRootPicker()">返回</button>
        </div>
      `;
    }

    function renderAiReveal() {
      const ai = appState.aiRound;
      const hints = ai.path.slice(0, ai.revealIndex).map(n => cleanLabel(n.label));
      const canGiveUp = ai.revealIndex >= ai.path.length;
      return `
        <div class="card">
          <p class="tiny">我正在一点点给你提示</p>
          <div class="solved-list">
            ${hints.map(h => `<span class="solved-item">${h}</span>`).join("")}
          </div>
        </div>
        <div class="button-row">
          <button class="primary" onclick="showAiAnswer(false)">我猜到了</button>
          <button class="secondary" onclick="nextAiReveal()" ${canGiveUp ? "disabled" : ""}>继续</button>
          <button class="ghost" onclick="showAiAnswer(true)" ${canGiveUp ? "" : "disabled"}>我猜不到</button>
        </div>
      `;
    }

    function renderAiAnswer(giveUp = false) {
      const word = appState.aiRound.wordLabel;
      const line = format(rand(giveUp ? REPLY_TEXT.aiGiveUp : REPLY_TEXT.aiAnswer), { word });
      if (giveUp) {
        const special = SPECIAL_LINES[word];
        return `
          <div class="card">
            <h2 class="question">${line}</h2>
            <p class="result-word">${word}</p>
            ${special ? `<p class="scene-poem" style="margin-top:14px;">${special}</p>` : ""}
          </div>
          <div class="button-row">
            <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
            <button class="secondary" onclick="startAiRound()">你再想一个词</button>
          </div>
        `;
      }

      return `
        <div class="card">
          <h2 class="question">${line}</h2>
          <p class="result-word">${word}</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="confirmAiGuessResult(true)">猜中了</button>
          <button class="secondary" onclick="confirmAiGuessResult(false)">没猜中</button>
        </div>
      `;
    }

    function renderAiAnswerSuccess() {
      const word = appState.aiRound.wordLabel;
      const special = SPECIAL_LINES[word];
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">猜中啦！</h2>
          <p class="result-word">${word}</p>
          ${special ? `<p class="scene-poem" style="margin-top:14px;">${special}</p>` : ""}
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
          <button class="secondary" onclick="startAiRound()">你再想一个词</button>
        </div>
      `;
    }

    function renderAiAnswerFail() {
      const word = appState.aiRound.wordLabel;
      return `
        <div class="card">
          <h2 class="title" style="font-size:28px;">这次没有猜中呢～</h2>
          <p class="result-word">${word}</p>
        </div>
        <div class="button-row">
          <button class="primary" onclick="goToRootPicker()">我再想一个词</button>
          <button class="secondary" onclick="startAiRound()">你再想一个词</button>
        </div>
      `;
    }

    function renderError(message) {
      return `
        <div class="card error-card">
          <h2 class="title" style="font-size:26px;">页面加载失败</h2>
          <p class="scene-poem">${message || "未知错误"}</p>
          <p class="scene-poem" style="margin-top:12px;">当前页面地址：${window.location.href}</p>
          <p class="scene-poem" style="margin-top:12px;">tree.json 测试地址：${window.location.origin + window.location.pathname.replace(/index\\.html$/, '') + 'data/tree.json'}</p>
          <p class="scene-poem" style="margin-top:12px;">请确认：
    1. tree.json 放在 ./data/tree.json
    2. 不是直接双击本地 html 打开
    3. 用 GitHub Pages / Live Server / 本地静态服务器运行</p>
        </div>
      `;
    }

    function render() {
      updateSceneUI();
      const main = document.getElementById("appMain");
      let html = "";

      switch (appState.view) {
        case "loading":
          html = `<div class="card"><p class="scene-poem">正在读取树数据……</p></div>`;
          break;
        case "error":
          html = renderError(appState.tempMessage || "未知错误");
          break;
        case "welcome":
          html = renderWelcome();
          break;
        case "root_picker":
          html = renderRootPicker();
          break;
        case "question":
          html = renderQuestion();
          break;
        case "negative_confirm":
          html = renderNegativeConfirm();
          break;
        case "negative_note_continue":
          html = renderSimpleMessage(`
            <div class="button-row">
              <button class="primary" onclick="resumeAfterNegativeContinue()">继续</button>
            </div>
          `);
          break;
        case "negative_note_stop":
          html = renderSimpleMessage(renderNextChoiceBlock());
          break;
        case "guess_word":
          html = renderGuessWord();
          break;
        case "guess_success":
          html = renderGuessSuccess();
          break;
        case "guess_fail":
          html = renderGuessFail();
          break;
        case "no_more_words":
          html = renderNoMoreWords();
          break;
        case "next_choice":
          html = renderNextChoiceBlock();
          break;
        case "hidden_word":
          html = renderHiddenWord();
          break;
        case "ai_intro":
          html = renderAiIntro();
          break;
        case "ai_reveal":
          html = renderAiReveal();
          break;
        case "ai_answer":
          html = renderAiAnswer(false);
          break;
        case "ai_giveup":
          html = renderAiAnswer(true);
          break;
        case "ai_answer_success":
          html = renderAiAnswerSuccess();
          break;
        case "ai_answer_fail":
          html = renderAiAnswerFail();
          break;
        default:
          html = renderWelcome();
      }

      main.innerHTML = html;
    }

    async function bootstrap() {
      try {
        const res = await fetch('./data/tree.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        if (!Array.isArray(raw)) throw new Error('tree.json 顶层不是数组');

        appState.data = { roots: raw };
        appState.view = "welcome";
      } catch (err) {
        appState.view = "error";
        appState.tempMessage = String(err && err.message ? err.message : err);
      }
      render();
    }

async function bootstrap() {
  try {
    const url = 'data/tree.json?ts=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}，读取失败：${url}`);
    }

    const text = await res.text();

    let raw;
    try {
      raw = JSON.parse(text);
    } catch (jsonErr) {
      throw new Error(`JSON 解析失败：${jsonErr.message}`);
    }

    if (!Array.isArray(raw)) {
      throw new Error(`tree.json 顶层不是数组，而是：${Object.prototype.toString.call(raw)}`);
    }

    appState.data = { roots: raw };
    appState.view = "welcome";

    render();
  } catch (err) {
    appState.view = "error";
    appState.tempMessage = err && err.message ? err.message : String(err);
    render();
  }
}
</script>
</body>
</html>
